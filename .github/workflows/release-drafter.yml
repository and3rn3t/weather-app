# Drafts an in-progress GitHub Release from merged PRs. Categories/template
# live in .github/release-drafter.yml (local, repo-specific). See
# reusable-release-drafter.yml for the shared runner.
name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-release-draft:
    uses: and3rn3t/.github/.github/workflows/reusable-release-drafter.yml@v1
