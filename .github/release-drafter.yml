name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bugfix', 'bug']
  - title: '🔒 Security'
    labels: ['security']
  - title: '🧰 Maintenance'
    labels: ['chore', 'dependencies', 'ci']
  - title: '📝 Documentation'
    labels: ['documentation', 'docs']

version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['fix', 'bugfix', 'bug', 'chore', 'dependencies', 'security', 'docs']
  default: patch

template: |
  ## What's Changed

  $CHANGES
